backend: generalized
constrain_outputs: true
mutation: standard
n_evals_per_individual: 16
n_individuals: 500
n_parallel_runs: 1
nan_replacement: -100000.0
distance: false
p_mut_functions: 0.1
recursive: false
selection:
  elite_size: 10
  tour_size: 7
  type: tournament
survival: truncation
unhealthy_termination: true
use_input_constants: true
saving_interval: 100
seed: [0, 26, 10]
store_fitness_details_list: [ healthy, ctrl, forward ]
nested0:
  # - crossover: true
  #   n_extra_registers: 5
  #   n_rows: 15
  #   p_mut_lhs: 0.3
  #   p_mut_rhs: 0.1
  #   solver: lgp
  - n_nodes: 31
    p_mut_inputs: 0.1
    p_mut_outputs: 0.3
    solver: cgp
